<aside class="family-filter-sidebar">
    <div class="sidebar-header">
        <ion-icon name="albums-outline" class="sidebar-icon"></ion-icon>
        <h3>Familias</h3>
    </div>

    <div class="sidebar-content">
        <button class="family-filter-item"
            [class.active]="familiaSeleccionada === null"
            (click)="seleccionarFamilia(null)">
            <ion-icon name="grid-outline" class="filter-icon"></ion-icon>
            <span class="filter-name">Todas las familias</span>
            <span class="filter-count">{{ productos.length }}</span>
        </button>

        <div class="family-divider"></div>

        @for (family of familias; track family.id) {
            <button class="family-filter-item"
                [class.active]="familiaSeleccionada === family.id.toString()"
                (click)="seleccionarFamilia(family.id.toString())">
                <ion-icon name="pricetag-outline" class="filter-icon"></ion-icon>
                <span class="filter-name">{{ family.name }}</span>
                <span class="filter-count">{{ contarProductosPorFamilia(family.id.toString()) }}</span>
            </button>
        }

        @if (familias.length === 0) {
            <div class="sidebar-empty">
                <ion-icon name="alert-circle-outline"></ion-icon>
                <p>No hay familias disponibles</p>
                <small>Crea familias primero</small>
            </div>
        }
    </div>
</aside>
