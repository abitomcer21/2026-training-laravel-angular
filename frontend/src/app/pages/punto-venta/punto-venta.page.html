<div class="tpv-container">
  <aside class="tpv-sidebar">
    <div class="sidebar-header">
      <span class="restaurant-name">{{ restaurantName }}</span>
    </div>

    <nav class="sidebar-nav">
      @for (item of menuItems; track item.valor) {
      <button class="nav-button" [class.active]="currentView === item.valor" (click)="selectView(item.valor)"
        [title]="item.nombre">
        <ion-icon [name]="item.icono"></ion-icon>
      </button>
      }
    </nav>

    <div class="sidebar-footer">
      @if (userRole === 'admin' || userRole === 'supervisor') {
      <button class="nav-button settings-btn" (click)="volverAlDashboard()" title="Volver al dashboard">
        <ion-icon name="options-outline"></ion-icon>
      </button>
      }
      <button class="nav-button logout-btn" (click)="closeSession()" title="Cerrar sesión">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </aside>

  <ion-content class="tpv-content ion-padding">
    <div class="content-wrapper">
      @switch (currentView) {
      @case ('mesas') {<app-mesas (vistaChange)="selectView($any($event))" />}
      @case ('productos') {<app-productos (cambiarVista)="selectView($any($event))" />}
      @case ('pedidos') {<app-pedidos />}
      @case ('caja') {<app-caja />}
      }
    </div>
  </ion-content>
</div>
