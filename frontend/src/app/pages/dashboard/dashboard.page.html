<!-- src/app/pages/dashboard/dashboard.page.html -->
<ion-header>
  <ion-toolbar class="main-toolbar">
    <ion-title>{{ restaurantName }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrarSesion()" class="logout-button">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
        <ion-label class="logout-text">Salir</ion-label>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <div class="nav-modern">
    <div *ngFor="let item of menuItems" class="nav-item" [class.active]="opcionSeleccionada === item.valor"
      (click)="seleccionarOpcion(item.valor)">
      <ion-icon [name]="item.icono" class="nav-icon"></ion-icon>
      <span class="nav-label">{{ item.nombre }}</span>
    </div>
  </div>
</ion-header>

<ion-content class="ion-padding">

  <!--usuarios-->
  <app-usuarios [active]="opcionSeleccionada === 'usuarios'" />
  <!-- familias-->
  <app-familias [active]="opcionSeleccionada === 'familias'" />
  <!-- productos-->
  <app-productos [active]="opcionSeleccionada === 'productos'" />
  <!-- impuestos-->
  <app-impuestos [active]="opcionSeleccionada === 'impuestos'" />
  <!-- zonas-->
  <app-zonas [active]="opcionSeleccionada === 'zonas'" />
  <!-- mesas-->
  <app-mesas [active]="opcionSeleccionada === 'mesas'" />
  
  <div class="app-footer">
    <div class="footer-content">
      <p>&copy; 2026 Yurest. Todos los derechos reservados.</p>
    </div>
  </div>

</ion-content>
