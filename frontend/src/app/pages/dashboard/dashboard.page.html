<!-- src/app/pages/dashboard/dashboard.page.html -->
<ion-header>
  <ion-toolbar class="main-toolbar">
    <ion-title>{{ restaurantName }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrarSesion()" class="logout-button">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
        <ion-label class="logout-text">Salir</ion-label>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <div class="nav-modern">
    <div *ngFor="let item of menuItems" class="nav-item" [class.active]="opcionSeleccionada === item.valor"
      (click)="seleccionarOpcion(item.valor)">
      <ion-icon [name]="item.icono" class="nav-icon"></ion-icon>
      <span class="nav-label">{{ item.nombre }}</span>
    </div>
  </div>
</ion-header>

<ion-content class="ion-padding">

  <div class="content-container">
    <!--usuarios-->
    <app-usuarios *ngIf="opcionSeleccionada === 'usuarios'" />
    <!-- familias-->
    <app-familias *ngIf="opcionSeleccionada === 'familias'" />
    <!-- productos-->
    <app-productos *ngIf="opcionSeleccionada === 'productos'" />
    <!-- impuestos-->
    <app-impuestos *ngIf="opcionSeleccionada === 'impuestos'" />
    <!-- zonas-->
    <app-zonas *ngIf="opcionSeleccionada === 'zonas'" />
    <!-- mesas-->
    <app-mesas *ngIf="opcionSeleccionada === 'mesas'" />
  </div>

</ion-content>
